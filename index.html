<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viaje Europa - Familia Morel</title>

  <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"/>

  <link rel="stylesheet" href="css/stylexit.css" />

  <style>
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .nombres {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 30px;
      color: #ccc;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>
  <div class="everything">

    <div class="container">
      <div class="countdown">

        <!-- TÍTULO -->
        <h1>✈️ VIAJE POR EUROPA 2026</h1>

        <!-- NOMBRES MÁS PEQUEÑOS -->
        <div class="nombres">
          Marco · Ingrid · Ale · Sandra · Walter 🌍
        </div>

        <!-- CONTADOR -->
        <div id="clock">
          <h2>⏳ Cuenta atrás para Europa</h2>
        </div>

      </div>
    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="js/moment.min.js"></script>
  <script src="js/moment-timezone-with-data.min.js"></script>
  <script src="js/jquery.countdown.min.js"></script>

  <script>
    $(document).ready(function () {

      var viaje = moment.tz("2026-06-02 00:00:00", "Europe/Madrid");

      $('#clock').countdown(viaje.toDate(), function (event) {
        $(this).html(event.strftime('' +
          '<div class="time">%D <span class="labels">días</span></div>' +
          '<div class="time">%H <span class="labels">horas</span></div>' +
          '<div class="time">%M <span class="labels">min</span></div>' +
          '<div class="time">%S <span class="labels">seg</span></div>'
        ));
      });

    });
  </script>

</body>
</html>
